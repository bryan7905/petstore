services:
  - type: web
    name: petstore-backend
    runtime: docker
    plan: free
    rootDir: backend
    envVars:
      - key: SPRING_DATASOURCE_HOST
        fromDatabase:
          name: petstore-db
          property: host
      - key: SPRING_DATASOURCE_PORT
        fromDatabase:
          name: petstore-db
          property: port
      - key: SPRING_DATASOURCE_DATABASE
        fromDatabase:
          name: petstore-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: petstore-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: petstore-db
          property: password
      - key: APP_CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: petstore-frontend
          property: host

  - type: web
    name: petstore-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: petstore-backend
          property: host
        append: /galang/v1

databases:
  - name: petstore-db
    plan: free
